spring:
  application:
    name: gateway-core
  datasource:
    url: jdbc:postgresql://localhost:5432/gateway_db
    username: gateway_user
    password: gateway_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}

gateway:
  plugin-dir: ./plugins
