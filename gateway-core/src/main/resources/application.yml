spring:
  application:
    name: gateway-core
  datasource:
    url: jdbc:postgresql://localhost:5432/gateway_db
    username: gateway_user
    password: gateway_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}

gateway:
  plugin-dir: ./plugins

resilience4j:
  circuitbreaker:
    instances:
      downstream:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      downstream:
        maxAttempts: 2
        waitDuration: 500
